x-docker-env: &docker-env
  CUSTOMERS_SERVICE_URL: "http://customers-service:8081"
  VISITS_SERVICE_URL: "http://visits-service:8082"
  VETS_SERVICE_URL: "http://vets-service:8083"
  GENAI_SERVICE_URL: "http://genai-service:8084"
  API_GATEWAY_URL: "http://api-gateway:8080"
  CONFIG_SERVER_URL: "http://config-server:8888"
  DISCOVERY_SERVER_URL: "http://discovery-server:8761"
  ZIPKIN_ENDPOINT: "http://tracing-server:9411/api/v2/spans"

services:
  # ──────────────────────────────────────────────
  # Infrastructure services (start first)
  # ──────────────────────────────────────────────

  config-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: config_server
        EXPOSED_PORT: 8888
    container_name: config-server
    ports:
      - "18888:8888"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: discovery_server
        EXPOSED_PORT: 8761
    container_name: discovery-server
    ports:
      - "18761:8761"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────
  # Business services (wait for config + discovery)
  # ──────────────────────────────────────────────

  customers-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: customers_service
        EXPOSED_PORT: 8081
    container_name: customers-service
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  visits-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: visits_service
        EXPOSED_PORT: 8082
    container_name: visits-service
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  vets-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: vets_service
        EXPOSED_PORT: 8083
    container_name: vets-service
    ports:
      - "8083:8083"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  genai-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: genai_service
        EXPOSED_PORT: 8084
    container_name: genai-service
    ports:
      - "8084:8084"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: api_gateway
        EXPOSED_PORT: 8080
    container_name: api-gateway
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  admin-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: admin_server
        EXPOSED_PORT: 9090
    container_name: admin-server
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *docker-env
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Observability (independent, no dependencies)
  # ──────────────────────────────────────────────

  tracing-server:
    image: openzipkin/zipkin
    container_name: tracing-server
    ports:
      - "19411:9411"
    deploy:
      resources:
        limits:
          memory: 512M

  grafana-server:
    image: grafana/grafana:10.4.2
    container_name: grafana-server
    ports:
      - "13030:3000"
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

  prometheus-server:
    image: prom/prometheus:v2.51.2
    container_name: prometheus-server
    ports:
      - "19091:9090"
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
