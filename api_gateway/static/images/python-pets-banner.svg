<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <linearGradient id="blueGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C78A9"/>
      <stop offset="100%" stop-color="#306998"/>
    </linearGradient>
    <linearGradient id="yellowGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE873"/>
      <stop offset="100%" stop-color="#FFD43B"/>
    </linearGradient>
  </defs>

  <!-- Friendly coiled snake in the center -->
  <g transform="translate(175, 15)">
    <!-- Outer coil ring bottom -->
    <ellipse cx="75" cy="130" rx="70" ry="28" fill="url(#blueGradB)" opacity="0.9"/>
    <!-- Outer coil ring middle -->
    <ellipse cx="75" cy="105" rx="60" ry="24" fill="url(#blueGradB)" opacity="0.85"/>
    <!-- Outer coil ring top -->
    <ellipse cx="75" cy="82" rx="50" ry="20" fill="url(#blueGradB)" opacity="0.8"/>
    <!-- Inner coil cutouts (to show coiled shape) -->
    <ellipse cx="75" cy="130" rx="50" ry="18" fill="#ffffff" opacity="0.12"/>
    <ellipse cx="75" cy="105" rx="42" ry="14" fill="#ffffff" opacity="0.12"/>
    <ellipse cx="75" cy="82" rx="34" ry="11" fill="#ffffff" opacity="0.12"/>
    <!-- Yellow belly stripe on coils -->
    <path d="M40 128c10 5 25 7 40 7c12 0 25-2 34-6" fill="none" stroke="#FFD43B" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M32 104c10 4 25 6 43 6c14 0 27-2 38-6" fill="none" stroke="#FFD43B" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
    <path d="M36 81c9 4 23 6 39 6c13 0 26-2 36-6" fill="none" stroke="#FFD43B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Snake neck rising from coil -->
    <path d="M75 62c0 0 8-15 10-30c2-12 0-22-5-28" fill="none" stroke="url(#blueGradB)" stroke-width="18" stroke-linecap="round"/>
    <!-- Snake neck yellow belly -->
    <path d="M77 62c0 0 5-14 6-28c1-10-1-18-3-23" fill="none" stroke="#FFD43B" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Snake head -->
    <ellipse cx="78" cy="6" rx="20" ry="16" fill="#306998"/>
    <ellipse cx="76" cy="4" rx="16" ry="11" fill="#3C78A9"/>
    <!-- Left eye -->
    <circle cx="69" cy="3" r="5" fill="white"/>
    <circle cx="70" cy="3" r="2.5" fill="#1a1a2e"/>
    <circle cx="70.5" cy="2.3" r="1" fill="white"/>
    <!-- Right eye -->
    <circle cx="85" cy="3" r="5" fill="white"/>
    <circle cx="86" cy="3" r="2.5" fill="#1a1a2e"/>
    <circle cx="86.5" cy="2.3" r="1" fill="white"/>
    <!-- Nostril bumps -->
    <ellipse cx="73" cy="8" rx="1.5" ry="1" fill="#1d4f76"/>
    <ellipse cx="81" cy="8" rx="1.5" ry="1" fill="#1d4f76"/>
    <!-- Smile -->
    <path d="M70 12c2 3 8 5 15 3" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tongue -->
    <line x1="78" y1="14" x2="78" y2="20" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="78" y1="20" x2="74" y2="24" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="78" y1="20" x2="82" y2="24" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Yellow belly on head -->
    <path d="M68 10c3 2 8 3 13 2" fill="none" stroke="#FFD43B" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Dog silhouette (right side) -->
  <g transform="translate(340, 55)">
    <!-- Dog body -->
    <path d="M8 90l0-28c0-10 7-18 16-20l4-12c2-5 7-6 9-2l3 9l12 0c10 0 18 8 18 20l4 0c6 0 10 5 10 11l0 10c0 5-4 8-8 8l-3 0l0 12c0 3-3 6-6 6l-5 0l0 6c0 3-2 5-5 5l-4 0c-3 0-5-2-5-5l0-6l-14 0l0 6c0 3-2 5-5 5l-4 0c-3 0-5-2-5-5l0-6l-5 0c-3 0-6-3-6-6l0-14c-4-2-8-6-8-10l0-6z" fill="#306998" opacity="0.85"/>
    <!-- Dog ear (floppy) -->
    <path d="M27 30c-5-10-3-20 3-26c4 7 5 16 2 24z" fill="#1d4f76" opacity="0.85"/>
    <!-- Dog snout -->
    <ellipse cx="62" cy="60" rx="12" ry="9" fill="#3C78A9" opacity="0.7"/>
    <!-- Dog eye -->
    <circle cx="42" cy="44" r="4" fill="#FFD43B"/>
    <circle cx="43" cy="44" r="2" fill="#1a1a2e"/>
    <!-- Dog nose -->
    <ellipse cx="65" cy="57" rx="5" ry="4" fill="#1a1a2e"/>
    <!-- Dog tail (wagging) -->
    <path d="M75 50c8-10 16-14 20-10c2 2 1 6-3 9c-5 4-11 5-16 4z" fill="#306998" opacity="0.7"/>
  </g>

  <!-- Cat silhouette (left side) -->
  <g transform="translate(40, 65)">
    <!-- Cat body -->
    <path d="M12 85l0-34c0-12 9-21 21-21l0-18c0-4 4-6 6-3l9 14l9-14c2-3 6-1 6 3l0 18c12 0 21 9 21 21l0 12c0 4-3 6-6 6l-4 0l0 10c0 3-2 5-5 5l-4 0c-2 0-4-2-4-5l0-10l-16 0l0 10c0 3-2 5-4 5l-4 0c-3 0-5-2-5-5l0-10l-4 0c-4 0-6-2-6-6l0-5z" fill="#FFD43B" opacity="0.82"/>
    <!-- Cat left ear inner -->
    <path d="M32 14l-5 11l9-4z" fill="#e6b800" opacity="0.7"/>
    <!-- Cat right ear inner -->
    <path d="M52 14l5 11l-9-4z" fill="#e6b800" opacity="0.7"/>
    <!-- Cat left eye -->
    <ellipse cx="34" cy="43" rx="5" ry="5.5" fill="#306998"/>
    <ellipse cx="34" cy="43" rx="2" ry="5" fill="#1a1a2e"/>
    <circle cx="33.5" cy="41" r="1.2" fill="white"/>
    <!-- Cat right eye -->
    <ellipse cx="50" cy="43" rx="5" ry="5.5" fill="#306998"/>
    <ellipse cx="50" cy="43" rx="2" ry="5" fill="#1a1a2e"/>
    <circle cx="49.5" cy="41" r="1.2" fill="white"/>
    <!-- Cat nose -->
    <path d="M40 52l2 3l2-3z" fill="#e6976f"/>
    <!-- Cat whiskers -->
    <line x1="20" y1="52" x2="36" y2="53" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="56" x2="36" y2="56" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <line x1="48" y1="53" x2="64" y2="52" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <line x1="48" y1="56" x2="64" y2="56" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <!-- Cat tail -->
    <path d="M12 65c-10-3-15-13-12-22c2 8 7 13 14 15z" fill="#FFD43B" opacity="0.65"/>
  </g>
</svg>
