<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Petclinic{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p8PVKlRt8nhZprml+UnBnQtP8RGUZ" crossorigin="anonymous">

  <!-- Font Awesome 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/petclinic.css">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><span></span></a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#main-navbar"
              aria-controls="main-navbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-navbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/" title="home page">
              <span class="fa fa-home"></span>
              <span>Home</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/owners" title="find owners">
              <span class="fa fa-search"></span>
              <span>Find owners</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/owners/new" title="register owner">
              <span class="fa fa-plus"></span>
              <span>Register owner</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/vets" title="veterinarians">
              <span class="fa fa-th-list"></span>
              <span>Veterinarians</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="container mt-5 mb-3">
    <div class="row">
      <div class="col-12 text-center">
        <img src="/static/images/spring-pivotal-logo.png" alt="Sponsored by Pivotal"/>
      </div>
    </div>
  </footer>

  <!-- Chat Widget -->
  <div id="chatbox">
    <div id="chatbox-header">
      <span class="fa fa-paw"></span>
      <span class="chatbox-title">Chat with Us!</span>
      <span class="fa fa-chevron-up chatbox-toggle-icon"></span>
    </div>
    <div id="chatbox-body">
      <div id="chatbox-messages"></div>
      <div id="chatbox-input-area">
        <input id="chatbox-input" type="text" placeholder="Type a message..." autocomplete="off">
        <button id="chatbox-send-btn" type="button" aria-label="Send">Send</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Markdown rendering for chat -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Chat widget JS -->
  <script src="/static/js/chat.js"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
